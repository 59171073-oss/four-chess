# Gradle JVM 参数
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# 启用 AndroidX
android.useAndroidX=true
# Kotlin 代码风格
kotlin.code.style=official
# 非传递 R 类，加快构建
android.nonTransitiveRClass=true
# 启用 Gradle 构建缓存与并行构建
org.gradle.caching=true
org.gradle.parallel=true
# 指定 Gradle Daemon 使用 JDK 17（本机环境）
org.gradle.java.home=/root/.local/share/mise/installs/java/17.0.2
# HTTP/HTTPS 代理（本机环境要求）
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=18080
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=18080
systemProp.http.nonProxyHosts=localhost|127.0.0.1|.svc|.cluster.local
